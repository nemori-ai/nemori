services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nemori
      POSTGRES_PASSWORD: nemori
      POSTGRES_DB: nemori
    ports:
      - "5432:5432"
    volumes:
      - nemori_pg_data:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemori"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - nemori_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nemori_pg_data:
  nemori_qdrant_data:
